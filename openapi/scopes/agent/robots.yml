    - GET /agent/robots/own/:id/results/:result_id

robots:results:read:team:
  team: true
  description: "Read team robot results"
  endpoints:
    - GET /agent/robots/team/:id/results
    - GET /agent/robots/team/:id/results/:result_id

# ============ Robot Activities Scopes ============

robots:activities:read:all:
  description: "Read all robot activities"
  endpoints:
    - GET /agent/robots/activities

robots:activities:read:own:
  owner: true
  description: "Read own robot activities"
  endpoints:
    - GET /agent/robots/activities

robots:activities:read:team:
  team: true
  description: "Read team robot activities"
  endpoints:
    - GET /agent/robots/activities
